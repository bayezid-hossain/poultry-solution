name: Release APK

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v1.0.0, v2.1.3, etc.

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Install Node Dependencies
        run: npm install
        
      - name: Create google-services.json
        env: 
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json
        
      - name: Prebuild Expo Project
        env:
          EXPO_PUBLIC_API_MODE: production
          NODE_ENV: production
        run: npx expo prebuild --platform android --no-install
        
      - name: Make Gradle Executable
        run: chmod +x android/gradlew
        
      - name: Build APK Release
        env:
          EXPO_PUBLIC_API_MODE: production
          NODE_ENV: production
        run: cd android && ./gradlew assembleRelease
        
      - name: Extract Release Notes
        id: release_notes
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME;
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            // Match the header for the current version and capture everything until the next header
            const escapeRegex = (s) => s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\\\$&');
            const match = changelog.match(new RegExp('## \\\[' + escapeRegex(version) + '\\\].*?\\n([\\\\s\\\\S]*?)(?=\\n## |$)', 'i'));
            let notes = match ? match[1].trim() : 'Bug fixes and performance improvements.';
            fs.writeFileSync('RELEASE_NOTES.txt', notes);
          "
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
